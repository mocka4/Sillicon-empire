<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Silicon Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060a0f;--surface:#0c1118;--card:#101820;--border:#1e3a2f;
  --green:#00ff88;--green2:#00cc6a;--cyan:#00d4ff;--gold:#ffd700;
  --red:#ff3366;--orange:#ff8c00;--purple:#9d4edd;--blue:#0099ff;
  --text:#c8d8e8;--dim:#4a6a7a;--bright:#e8f4ff;
  --font-mono:'Share Tech Mono',monospace;
  --font-ui:'Rajdhani',sans-serif;
  --font-head:'Orbitron',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--font-ui);font-size:14px;touch-action:manipulation}

/* SCANLINE OVERLAY */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(
  0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:9999}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;
  transition:opacity .4s;z-index:10}
.screen.off{opacity:0;pointer-events:none}

/* ── INTRO ── */
#intro{align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0a1a0d 0%,#060a0f 70%)}
.intro-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,255,136,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,.04) 1px,transparent 1px);
  background-size:40px 40px}
.intro-glow{position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,255,136,.08) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%)}
.logo-wrap{position:relative;z-index:2;text-align:center;padding:20px}
.logo-pre{font-family:var(--font-mono);color:var(--green);font-size:11px;
  letter-spacing:4px;margin-bottom:12px;opacity:.7}
.logo{font-family:var(--font-head);font-size:clamp(32px,8vw,56px);font-weight:900;
  color:var(--bright);letter-spacing:3px;line-height:1;
  text-shadow:0 0 40px rgba(0,255,136,.4)}
.logo span{color:var(--green)}
.logo-sub{font-family:var(--font-mono);font-size:12px;color:var(--dim);
  letter-spacing:6px;margin-top:8px;text-transform:uppercase}
.boot-text{font-family:var(--font-mono);font-size:12px;color:var(--green);
  margin-top:30px;min-height:80px;line-height:1.8;opacity:.8;max-width:380px;text-align:left}
.cursor-blink{animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.start-btn{margin-top:30px;font-family:var(--font-head);font-size:14px;font-weight:700;
  letter-spacing:3px;padding:14px 40px;background:transparent;
  border:2px solid var(--green);color:var(--green);cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden}
.start-btn::before{content:'';position:absolute;inset:0;background:var(--green);
  transform:translateX(-100%);transition:transform .3s;z-index:-1}
.start-btn:hover::before,.start-btn:active::before{transform:translateX(0)}
.start-btn:hover,.start-btn:active{color:var(--bg)}

/* ── MAIN GAME ── */
#game{flex-direction:column}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;
  position:relative}
.company-name-top{font-family:var(--font-head);font-size:13px;font-weight:700;
  color:var(--green);letter-spacing:1px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chapter-badge{font-family:var(--font-mono);font-size:10px;color:var(--dim);
  background:rgba(0,255,136,.06);border:1px solid var(--border);
  padding:3px 8px;border-radius:2px;white-space:nowrap}
.pause-btn{font-size:16px;background:none;border:none;cursor:pointer;
  color:var(--dim);padding:4px 8px}

/* STATS BAR */
.statsbar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;
  background:var(--border);border-bottom:2px solid var(--border);flex-shrink:0}
.stat{background:var(--surface);padding:6px 4px;text-align:center}
.stat-icon{font-size:14px;display:block}
.stat-val{font-family:var(--font-mono);font-size:11px;color:var(--bright);
  display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-lbl{font-size:9px;color:var(--dim);display:block;text-transform:uppercase}

/* NEWS TICKER */
.ticker-wrap{background:#050d08;border-bottom:1px solid var(--border);
  overflow:hidden;height:22px;flex-shrink:0;display:flex;align-items:center}
.ticker-label{font-family:var(--font-mono);font-size:9px;color:var(--green);
  padding:0 8px;white-space:nowrap;border-right:1px solid var(--border)}
.ticker{font-family:var(--font-mono);font-size:10px;color:var(--dim);
  white-space:nowrap;animation:scroll-ticker 40s linear infinite;padding-left:100%}
@keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* MAIN CONTENT */
.game-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.game-body::-webkit-scrollbar{width:3px}
.game-body::-webkit-scrollbar-thumb{background:var(--border)}

/* TABS */
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;
  background:var(--border);flex-shrink:0;position:sticky;bottom:0;z-index:20}
.tab{background:var(--surface);padding:8px 4px;text-align:center;
  cursor:pointer;transition:background .2s;border:none;color:var(--dim)}
.tab .tab-icon{font-size:16px;display:block}
.tab .tab-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.tab.active{background:var(--card);color:var(--green)}
.tab:active{background:rgba(0,255,136,.1)}

/* PANELS */
.panel{display:none;padding:12px;animation:fadeIn .2s}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* STORY PANEL */
.story-card{background:var(--card);border:1px solid var(--border);border-radius:4px;
  margin-bottom:12px;overflow:hidden}
.story-header{padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px}
.chapter-num{font-family:var(--font-mono);font-size:10px;color:var(--green);
  background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);
  padding:2px 8px;border-radius:2px}
.story-title{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--bright)}
.story-body{padding:14px;font-size:13px;line-height:1.7;color:var(--text)}
.story-body .highlight{color:var(--green);font-weight:600}
.story-body .warning{color:var(--red)}
.story-body .gold{color:var(--gold)}

/* DECISION CARD */
.decision-card{background:linear-gradient(135deg,#0c1a14,#0c1118);
  border:1px solid rgba(0,255,136,.2);border-radius:4px;margin-bottom:10px;
  overflow:hidden;position:relative}
.decision-card::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--green)}
.dec-header{padding:10px 14px 6px;font-family:var(--font-mono);font-size:10px;
  color:var(--green);letter-spacing:2px;text-transform:uppercase}
.dec-question{padding:0 14px 10px;font-size:13px;color:var(--bright);line-height:1.5}
.dec-options{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.dec-opt{background:var(--card);padding:12px 14px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  transition:background .15s;border:none;width:100%;text-align:left;color:var(--text)}
.dec-opt:active{background:rgba(0,255,136,.08)}
.dec-opt-text{font-size:13px;flex:1}
.dec-opt-cost{font-family:var(--font-mono);font-size:10px;color:var(--dim);
  white-space:nowrap;margin-left:10px}
.dec-opt-cost.green{color:var(--green)}
.dec-opt-cost.red{color:var(--red)}
.dec-opt-cost.gold{color:var(--gold)}

/* RESULT CARD */
.result-card{background:var(--card);border-radius:4px;margin-bottom:12px;overflow:hidden}
.result-good{border-left:3px solid var(--green)}
.result-bad{border-left:3px solid var(--red)}
.result-neutral{border-left:3px solid var(--cyan)}
.result-header{padding:10px 14px;display:flex;align-items:center;gap:8px}
.result-icon{font-size:20px}
.result-title{font-family:var(--font-head);font-size:13px;font-weight:700}
.result-body{padding:0 14px 12px;font-size:12px;line-height:1.6;color:var(--dim)}
.result-effects{padding:8px 14px;border-top:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:6px}
.effect-chip{font-family:var(--font-mono);font-size:10px;padding:3px 8px;
  border-radius:2px;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.effect-chip.pos{color:var(--green);border-color:rgba(0,255,136,.3)}
.effect-chip.neg{color:var(--red);border-color:rgba(255,51,102,.3)}

/* RIVALS PANEL */
.rival-card{background:var(--card);border:1px solid var(--border);border-radius:4px;
  margin-bottom:10px;overflow:hidden}
.rival-header{padding:10px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border)}
.rival-logo{width:36px;height:36px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0}
.rival-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--bright)}
.rival-tag{font-size:10px;color:var(--dim);margin-top:2px}
.rival-threat{font-family:var(--font-mono);font-size:10px;padding:2px 8px;
  border-radius:10px;margin-left:auto}
.threat-low{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.threat-med{background:rgba(255,140,0,.1);color:var(--orange);border:1px solid rgba(255,140,0,.3)}
.threat-high{background:rgba(255,51,102,.1);color:var(--red);border:1px solid rgba(255,51,102,.3)}
.rival-body{padding:10px 14px}
.rival-stat-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.rival-stat{flex:1;min-width:60px;background:rgba(0,0,0,.3);
  border-radius:3px;padding:6px 8px;text-align:center}
.rival-stat-n{font-family:var(--font-mono);font-size:12px;color:var(--bright)}
.rival-stat-l{font-size:9px;color:var(--dim);text-transform:uppercase}
.rival-action{font-size:11px;color:var(--orange);font-style:italic;margin-top:4px}

/* PROGRESS BAR */
.pbar-wrap{margin:6px 0}
.pbar-label{display:flex;justify-content:space-between;margin-bottom:3px}
.pbar-label span{font-size:10px;color:var(--dim)}
.pbar-label span:last-child{font-family:var(--font-mono);color:var(--bright)}
.pbar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px;transition:width .5s}
.pbar-fill.green{background:linear-gradient(90deg,var(--green2),var(--green))}
.pbar-fill.blue{background:linear-gradient(90deg,#0066cc,var(--blue))}
.pbar-fill.gold{background:linear-gradient(90deg,#cc8800,var(--gold))}
.pbar-fill.red{background:linear-gradient(90deg,#cc0033,var(--red))}
.pbar-fill.purple{background:linear-gradient(90deg,#6a0dad,var(--purple))}

/* COMPANY PANEL */
.section-title{font-family:var(--font-head);font-size:11px;font-weight:700;
  color:var(--dim);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:10px;cursor:pointer;transition:border-color .2s;position:relative}
.product-card:active{border-color:var(--green)}
.product-card.locked{opacity:.5;cursor:not-allowed}
.product-card.active-product{border-color:rgba(0,255,136,.4);
  background:linear-gradient(135deg,#0c1a14,#0c1118)}
.product-icon{font-size:24px;margin-bottom:6px}
.product-name{font-family:var(--font-ui);font-size:12px;font-weight:600;color:var(--bright)}
.product-rev{font-family:var(--font-mono);font-size:10px;color:var(--green)}
.product-badge{position:absolute;top:6px;right:6px;font-size:8px;
  padding:2px 5px;border-radius:2px}
.badge-active{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.badge-locked{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border)}
.badge-dev{background:rgba(0,148,255,.15);color:var(--blue);border:1px solid rgba(0,148,255,.3)}

/* HIRE PANEL */
.hire-card{background:var(--card);border:1px solid var(--border);border-radius:4px;
  margin-bottom:8px;display:flex;align-items:center;gap:10px;padding:10px 12px;
  cursor:pointer;transition:border-color .2s}
.hire-card:active{border-color:var(--cyan)}
.hire-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
  background:rgba(0,0,0,.4);border:1px solid var(--border)}
.hire-info{flex:1;min-width:0}
.hire-name{font-size:13px;font-weight:600;color:var(--bright)}
.hire-role{font-size:10px;color:var(--dim);margin-top:1px}
.hire-skills{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.skill-tag{font-size:9px;padding:1px 5px;border-radius:2px;
  background:rgba(0,148,255,.1);color:var(--blue);border:1px solid rgba(0,148,255,.2)}
.hire-cost{text-align:right;flex-shrink:0}
.hire-salary{font-family:var(--font-mono);font-size:11px;color:var(--gold)}
.hire-btn{font-family:var(--font-ui);font-size:10px;font-weight:600;
  padding:4px 10px;border:1px solid var(--green);color:var(--green);
  background:transparent;border-radius:2px;cursor:pointer;margin-top:4px;
  display:block;transition:all .15s}
.hire-btn:active{background:var(--green);color:var(--bg)}

/* RESEARCH PANEL */
.research-tree{display:flex;flex-direction:column;gap:8px}
.research-card{background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:12px;cursor:pointer;transition:all .2s;position:relative}
.research-card.researched{border-color:rgba(0,255,136,.3);
  background:linear-gradient(135deg,#0a1a10,#0c1118)}
.research-card.locked{opacity:.5;cursor:not-allowed}
.research-card:not(.locked):not(.researched):active{border-color:var(--cyan)}
.research-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.research-icon{font-size:22px}
.research-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--bright)}
.research-tier{font-size:9px;color:var(--dim);margin-top:1px}
.research-desc{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:8px}
.research-footer{display:flex;justify-content:space-between;align-items:center}
.research-cost{font-family:var(--font-mono);font-size:11px}
.research-status{font-size:10px;padding:3px 8px;border-radius:2px}
.rs-done{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.rs-avail{background:rgba(0,148,255,.1);color:var(--blue);border:1px solid rgba(0,148,255,.2)}
.rs-locked{background:rgba(255,255,255,.03);color:var(--dim);border:1px solid var(--border)}
.rs-building{background:rgba(255,140,0,.1);color:var(--orange);border:1px solid rgba(255,140,0,.3)}

/* EVENT POPUP */
.event-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;z-index:100;
  padding:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.event-overlay.show{opacity:1;pointer-events:all}
.event-box{background:var(--card);border:1px solid var(--border);
  border-radius:6px;width:100%;max-width:420px;overflow:hidden;
  transform:scale(.95);transition:transform .3s}
.event-overlay.show .event-box{transform:scale(1)}
.event-box.crisis{border-color:rgba(255,51,102,.4)}
.event-box.opportunity{border-color:rgba(0,255,136,.4)}
.event-box.rival{border-color:rgba(255,140,0,.4)}
.event-top{padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px}
.event-emoji{font-size:32px;flex-shrink:0}
.event-title{font-family:var(--font-head);font-size:15px;font-weight:700;
  color:var(--bright);margin-bottom:4px}
.event-type-tag{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;
  padding:2px 6px;border-radius:2px}
.tag-crisis{background:rgba(255,51,102,.15);color:var(--red);border:1px solid rgba(255,51,102,.3)}
.tag-oppo{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.tag-rival{background:rgba(255,140,0,.1);color:var(--orange);border:1px solid rgba(255,140,0,.3)}
.tag-neutral{background:rgba(0,148,255,.1);color:var(--blue);border:1px solid rgba(0,148,255,.2)}
.event-desc{padding:14px 16px;font-size:13px;line-height:1.6;color:var(--text);
  border-bottom:1px solid var(--border)}
.event-choices{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.event-choice{background:var(--card);padding:12px 16px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  border:none;width:100%;text-align:left;transition:background .15s}
.event-choice:active{background:rgba(0,255,136,.07)}
.choice-text{font-size:13px;color:var(--text)}
.choice-hint{font-family:var(--font-mono);font-size:10px;color:var(--dim);margin-left:8px}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:8px 16px;font-family:var(--font-mono);font-size:12px;
  z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.good{border-color:rgba(0,255,136,.4);color:var(--green)}
.toast.bad{border-color:rgba(255,51,102,.4);color:var(--red)}
.toast.info{border-color:rgba(0,148,255,.4);color:var(--cyan)}

/* VALUATION BANNER */
.val-banner{background:linear-gradient(135deg,#0a1a0d,#050d08);
  border:1px solid rgba(0,255,136,.2);border-radius:4px;padding:14px;
  margin-bottom:12px;text-align:center}
.val-amount{font-family:var(--font-head);font-size:clamp(22px,5vw,32px);
  font-weight:900;color:var(--green);text-shadow:0 0 20px rgba(0,255,136,.3)}
.val-label{font-family:var(--font-mono);font-size:10px;color:var(--dim);
  letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.val-rank{font-size:12px;color:var(--gold);margin-top:6px}

/* RANK TABLE */
.rank-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.rank-table th{font-family:var(--font-mono);font-size:10px;color:var(--dim);
  padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;letter-spacing:1px}
.rank-table td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.03);
  font-size:12px}
.rank-you{background:rgba(0,255,136,.05)!important}
.rank-you td{color:var(--green)!important}
.rank-num{font-family:var(--font-mono);color:var(--dim)}
.rank-val{font-family:var(--font-mono);color:var(--bright)}

/* WIN SCREEN */
#win{align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0d1a10 0%,#060a0f 70%)}
.win-content{text-align:center;padding:20px;max-width:420px;
  animation:rise .8s cubic-bezier(.34,1.56,.64,1)}
@keyframes rise{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.win-emoji{font-size:64px;margin-bottom:16px;display:block}
.win-title{font-family:var(--font-head);font-size:28px;font-weight:900;
  color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.4);margin-bottom:8px}
.win-sub{font-size:14px;color:var(--text);margin-bottom:24px;line-height:1.6}
.win-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;width:100%}
.win-stat{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px}
.win-stat-n{font-family:var(--font-head);font-size:18px;color:var(--green)}
.win-stat-l{font-size:10px;color:var(--dim);text-transform:uppercase;margin-top:2px}

/* MISC */
.divider{height:1px;background:var(--border);margin:12px 0}
.empty-state{text-align:center;padding:30px 20px;color:var(--dim);font-size:12px}
.btn-primary{font-family:var(--font-head);font-size:12px;font-weight:700;
  letter-spacing:1px;padding:10px 20px;background:transparent;
  border:1px solid var(--green);color:var(--green);cursor:pointer;
  transition:all .2s;border-radius:2px;width:100%;margin-top:8px}
.btn-primary:active{background:var(--green);color:var(--bg)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:active{background:var(--red);color:#fff}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.btn-gold:active{background:var(--gold);color:var(--bg)}
.tag-new{background:var(--red);color:#fff;font-size:9px;padding:1px 4px;
  border-radius:2px;margin-left:4px;vertical-align:middle}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* MARKET CHART */
.chart-wrap{background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:12px;margin-bottom:12px}
.chart-title{font-family:var(--font-mono);font-size:10px;color:var(--dim);
  margin-bottom:8px;letter-spacing:2px;text-transform:uppercase}
canvas.minichart{width:100%;height:60px;display:block}

/* OFFICE UPGRADE */
.office-card{background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:center}
.office-icon{font-size:28px;flex-shrink:0}
.office-info{flex:1}
.office-name{font-size:13px;font-weight:600;color:var(--bright)}
.office-desc{font-size:11px;color:var(--dim);margin-top:2px}
.office-cost{font-family:var(--font-mono);font-size:11px;color:var(--gold);margin-top:4px}

function getValDisplay(n) {
  if (n >= 1e12) return '$' + (n/1e12).toFixed(1) + 'T';
  if (n >= 1e9)  return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3)  return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n;
}
function getMoneyDisplay(n) { return getValDisplay(n); }

// ═══════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════

let gameTimerInterval = null;

function startGame() {
  // Init rivals
  G.rivals = RIVAL_TEMPLATES.filter(r => r.startChapter <= 2).map(r => ({
    ...r, valuation: r.baseVal, hp: 100, active: true,
    currentAction: r.actions[0],
  }));
  // Init products
  G.products = PRODUCTS_DATA.map(p => ({...p}));
  G.products[0].active = true; // CodeMind starts active
  G.activeProducts = ['p1'];
  // Initial team
  G.team = [{ name:G.playerName, role:'Founder / CEO', emoji:'🧑‍💻', salary:0, skills:['Vision','Code','Hustle'] }];
  // Valuation
  G.valuation = 50000;
  G.chartData = [G.valuation];
  // Ticker
  G.tickerItems = [...TICKER_BASE];
  updateTicker();
  // Init skill effects
  computeSkillEffects();
  // Seed first emails
  checkEmailQueue();
  // Show game
  showScreen('game');
  loadStoryNode(G.storyNode);
  updateAllUI();
  // Start game loop
  gameTimerInterval = setInterval(gameTick, 8000); // Every 8s = 1 week
  // Random events every ~30s
  setInterval(maybeSpawnEvent, 30000);
}

function gameTick() {
  if (G.won || G.gameOver) return;
  G.week++;
  if (G.week > 4) { G.week = 1; G.month++; }
  if (G.month > 12) { G.month = 1; G.year++; }

  // Revenue & costs
  let rev = G.monthlyRevenue;
  let costs = G.team.reduce((sum, m) => sum + (m.salary || 0), 0) / 12;
  // Add product revenue
  G.products.filter(p=>p.active).forEach(p => { rev += p.baseRev * (1 + G.techLevel * 0.05); });

  if (G.week === 1) { // Monthly tick
    G.money += Math.floor(rev - costs);
    G.monthlyRevenue = rev;
    G.monthlyCosts = costs;
    G.chartData.push(G.valuation);
    if (G.chartData.length > 20) G.chartData.shift();
    if (G.money < 0) { showToast('⚠️ Dangerously low on cash!', 'bad'); }
    // Grow rivals
    tickRivals();
    // Research progress
    tickResearch();
    // Tech debt
    tickTechDebt();
    // Email queue
    checkEmailQueue();
    // Twitter feed
    updateTwitterFeed();
    // Skill effects
    computeSkillEffects();
    // Skill points on chapter milestones
    if (G.chapter > (G._lastSkillChapter || 0)) {
      G._lastSkillChapter = G.chapter;
      G.skillPoints += 2;
      showToast('🌟 +2 Skill Points earned! Spend them in the Skills tab.', 'good');
    }
    // Valuation milestones give skill points too
    const valMilestones = [1e6, 10e6, 100e6, 1e9, 10e9, 100e9, 1e12];
    valMilestones.forEach(m => {
      if (G.valuation >= m && !G._valMilestones) G._valMilestones = {};
      if (G.valuation >= m && G._valMilestones && !G._valMilestones[m]) {
        G._valMilestones[m] = true;
        G.skillPoints++;
        G.legacyScore += 10;
        showToast('💎 Milestone: ' + getValDisplay(m) + ' valuation! +1 Skill Point', 'good');
      }
    });
    // Check chapter advance
    checkChapterAdvance();
  }

  // Update valuation
  G.valuation = calcValuation();
  // New systems
  updateStock();
  checkAchievements();
  // Board trust decays slightly each month if investor happiness is low
  if (G.week === 1 && G.investorHappiness < 50) updateBoardTrust(-3);
  if (G.week === 1 && G.investorHappiness > 70) updateBoardTrust(2);
  // Morale slowly recovers
  if (G.week === 2 && G.morale < 100) G.morale = Math.min(100, G.morale + 1);
  updateAllUI();
}

function calcValuation() {
  const base = G.monthlyRevenue * 12 * 8; // 8x ARR multiple
  const techBonus = G.techLevel * 50000;
  const repBonus = G.reputation * 10000;
  const teamBonus = G.team.length * 100000;
  return Math.max(G.valuation * 1.002, base + techBonus + repBonus + teamBonus);
}

function tickRivals() {
  G.rivals.forEach(r => {
    if (!r.active) return;
    r.valuation *= 1.05 + Math.random() * 0.03;
    r.currentAction = r.actions[Math.floor(Math.random() * r.actions.length)];
    // Occasionally add ticker item about rival
    if (Math.random() < 0.3) {
      G.tickerItems.push(`${r.name} is ${r.currentAction.toLowerCase()}`);
      updateTicker();
    }
  });
}

function tickResearch() {
  if (!G.researchQueue) return;
  G.researchProgress += 1;
  const item = RESEARCH_ITEMS.find(r => r.id === G.researchQueue);
  if (item && G.researchProgress >= item.cost.time) {
    // Complete research
    G.researched.push(G.researchQueue);
    G.researchQueue = null;
    G.researchProgress = 0;
    // Apply effects
    if (item.effect.tech) G.techLevel += item.effect.tech;
    if (item.effect.rep) G.reputation += item.effect.rep;
    if (item.effect.monthlyRevenue) G.monthlyRevenue += item.effect.monthlyRevenue;
    if (item.effect.valuation) G.valuation += item.effect.valuation;
    showToast(`✅ Research Complete: ${item.name}!`, 'good');
    renderResearch();
  }
}

function checkChapterAdvance() {
  const ch = CHAPTERS[G.chapter - 1];
  const next = CHAPTERS[G.chapter];
  if (next && G.valuation >= next.minVal) {
    G.chapter++;
    // Unlock new rivals
    RIVAL_TEMPLATES.filter(r => r.startChapter === G.chapter && !G.rivals.find(x=>x.id===r.id)).forEach(r => {
      G.rivals.push({ ...r, valuation: r.baseVal, hp: 100, active: true, currentAction: r.actions[0] });
    });
    // Unlock new products
    G.products.filter(p => p.unlockChapter <= G.chapter && !p.active && !G.activeProducts.includes(p.id))
      .forEach(p => { showToast(`🆕 New product unlocked: ${p.name}!`, 'info'); });
    showToast(`🚀 Chapter ${G.chapter}: ${CHAPTERS[G.chapter-1].name}!`, 'good');
    document.getElementById('chapterBadge').textContent = `CH.${G.chapter}`;
  }
}

function maybeSpawnEvent() {
  if (G.won || G.gameOver || G.pendingEvent) return;
  const allEvents = [...RANDOM_EVENTS, ...EXTRA_EVENTS];
  const eligible = allEvents.filter(e => !G.events.includes(e.id));
  if (eligible.length === 0) return;
  if (Math.random() < 0.65) {
    const event = eligible[Math.floor(Math.random() * eligible.length)];
    G.events.push(event.id);
    showEvent(event);
  }
}

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!G.achievements.includes(a.id) && a.check(G)) {
      G.achievements.push(a.id);
      showAchievementPopup(a);
    }
  });
}

function showAchievementPopup(a) {
  const t = document.getElementById('toast');
  t.innerHTML = `${a.emoji} <strong>ACHIEVEMENT:</strong> ${a.name} — ${a.desc}`;
  t.className = 'toast good show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 4000);
}

function updateMorale(delta, reason) {
  G.morale = Math.max(0, Math.min(100, G.morale + delta));
  if (Math.abs(delta) >= 5) showToast(`${delta>0?'😊':'😟'} Morale: ${delta>0?'+':''}${delta} (${reason})`, delta>0?'good':'bad');
  // Low morale causes random resignations
  if (G.morale < 30 && G.team.length > 1 && Math.random() < 0.3) {
    const leaver = G.team.find(m => m.name !== G.playerName);
    if (leaver) {
      G.team = G.team.filter(m => m !== leaver);
      showToast(`😢 ${leaver.name} resigned due to low morale!`, 'bad');
    }
  }
}

function updateStock() {
  // Stock follows valuation with volatility
  const targetPrice = G.valuation / 1e8;
  const volatility = (Math.random() - 0.48) * 0.08;
  G.stockPrice = Math.max(0.01, G.stockPrice * (1 + volatility) * 0.95 + targetPrice * 0.05);
  G.stockHistory.push(parseFloat(G.stockPrice.toFixed(2)));
  if (G.stockHistory.length > 30) G.stockHistory.shift();
  // Investor happiness based on stock trend
  const trend = G.stockHistory.length > 2 ?
    G.stockHistory[G.stockHistory.length-1] / G.stockHistory[G.stockHistory.length-3] : 1;
  G.investorHappiness = Math.max(0, Math.min(100, G.investorHappiness + (trend > 1 ? 3 : -4)));
  // Board fires you if trust too low
  if (G.boardTrust < 20 && !G.won) {
    showToast('💀 GAME OVER: Board of Directors voted to remove you as CEO.', 'bad');
    G.gameOver = true;
    setTimeout(() => showGameOver(), 2000);
  }
}

function updateBoardTrust(delta) {
  G.boardTrust = Math.max(0, Math.min(100, G.boardTrust + delta));
}

function showEvent(event) {
  G.pendingEvent = event;
  const box = document.getElementById('eventBox');
  box.className = 'event-box ' + (event.type === 'crisis' ? 'crisis' : event.type === 'opportunity' ? 'opportunity' : 'rival');
  document.getElementById('evEmoji').textContent = event.emoji;
  document.getElementById('evTitle').textContent = event.title;
  const tag = document.getElementById('evTag');
  tag.textContent = event.tag;
  tag.className = 'event-type-tag ' + event.tagClass;
  document.getElementById('evDesc').textContent = event.desc;
  const choices = document.getElementById('evChoices');
  choices.innerHTML = event.choices.map((c,i) => `
    <button class="event-choice" onclick="resolveEvent(${i})">
      <span class="choice-text">${c.text}</span>
      <span class="choice-hint">${c.hint}</span>
    </button>`).join('');

}

function resolveEvent(choiceIdx) {
  const event = G.pendingEvent;
  if (!event) return;
  const choice = event.choices[choiceIdx];
  applyEffects(choice.effect || {});
  G.pendingEvent = null;
  G.totalDecisions++;
  if (event.type === 'crisis') {
    G.crisisWeathered++;
    updateMorale(-5, 'Crisis stress');
    updateBoardTrust(-2);
  } else if (event.type === 'opportunity') {
    updateMorale(5, 'Exciting opportunity!');
    updateBoardTrust(2);
    G.pressMentions++;
  }
  // Ticker update about the event
  G.tickerItems.push(`BREAKING: ${event.title} — NexMind responds`);
  updateTicker();
  checkAchievements();
  document.getElementById('eventOverlay').classList.remove('show');
  updateAllUI();
}

// ── STORY ENGINE ────────────────────────────────────────────
function loadStoryNode(nodeId) {
  G.storyNode = nodeId;
  const node = STORY[nodeId];
  if (!node) return;
  renderStory(node);
}

function applyEffects(effects) {
  if (!effects) return;
  if (effects.money)        G.money        += effects.money;
  if (effects.rep)          G.reputation   = Math.max(0, G.reputation + effects.rep);
  if (effects.tech)         G.techLevel    = Math.max(1, G.techLevel + effects.tech);
  if (effects.valuation)    G.valuation    = Math.max(G.valuation, effects.valuation);
  if (effects.monthlyRevenue) G.monthlyRevenue += effects.monthlyRevenue;
  if (effects.teamAdd) {
    if (G.team.length < G.maxTeam + 3) { // some flexibility
      G.team.push(effects.teamAdd);
      showToast(`✅ ${effects.teamAdd.name} joined the team!`, 'good');
    }
  }
  if (effects.team && effects.team < 0) {
    for (let i = 0; i < Math.abs(effects.team); i++) {
      if (G.team.length > 1) G.team.pop();
    }
  }
  if (effects.rivalBoost) {
    const r = G.rivals.find(x => x.id === effects.rivalBoost);
    if (r) { r.valuation *= 2; r.hp = Math.min(100, r.hp + 20); }
  }
  if (effects.rivalRemove) {
    const r = G.rivals.find(x => x.id === effects.rivalRemove);
    if (r) { r.active = false; G.rivalsAcquired++; showToast(`💀 ${r.name} has been eliminated!`, 'good'); }
  }
  if (effects.rivalSlow) {
    const r = G.rivals.find(x => x.id === effects.rivalSlow);
    if (r) { r.valuation *= 0.7; showToast(`📉 ${r.name} has been slowed down!`, 'good'); }
  }
  if (effects.won) { G.won = true; }
  if (effects.techDebt_reduce) G.techDebt = Math.max(0, G.techDebt - effects.techDebt_reduce);
  if (effects.techDebt_add) G.techDebt = Math.min(100, G.techDebt + effects.techDebt_add);
  if (effects.morale) updateMorale(effects.morale, 'event outcome');
  if (effects.boardTrust) updateBoardTrust(effects.boardTrust);
  if (effects.pressMentions) G.pressMentions = (G.pressMentions || 0) + effects.pressMentions;
  if (effects.rivalSlow) {
    const r2 = G.rivals.find(x => x.id === effects.rivalSlow);
    if (r2) { r2.valuation *= 0.7; showToast(`📉 ${r2.name} has been slowed!`, 'good'); }
  }
}

function makeDecision(optIdx, node) {
  const opt = node.options[optIdx];
  G.totalDecisions++;
  applyEffects(opt.effect || {});
  // Morale + board effects from decisions
  const moneyEffect = opt.effect ? (opt.effect.money || 0) : 0;
  const repEffect = opt.effect ? (opt.effect.rep || 0) : 0;
  if (repEffect > 10) { updateMorale(5, 'Great decision!'); updateBoardTrust(3); }
  if (repEffect < -10) { updateMorale(-8, 'Bad press hit morale'); updateBoardTrust(-5); }
  if (moneyEffect > 500000) { updateBoardTrust(5); }
  if (moneyEffect < -1000000) { updateBoardTrust(-4); updateMorale(-3, 'Big spending worried team'); }
  checkAchievements();
  loadStoryNode(opt.result);
  updateAllUI();
  document.getElementById('gameBody').scrollTop = 0;
  if (G.won) setTimeout(() => showWin(), 1500);
}

// ── RENDER FUNCTIONS ────────────────────────────────────────
function renderStory(node) {
  const cont = document.getElementById('storyContent');
  let html = '';

  if (node.chapter) {
    const ch = CHAPTERS[node.chapter - 1];
    html += `
      <div class="story-card">
        <div class="story-header">
          <span class="chapter-num">CHAPTER ${node.chapter}</span>
          <span style="font-size:20px">${ch.icon}</span>
          <div class="story-title">${node.title}</div>
        </div>
        <div class="story-body">${node.text.replace(/\n/g,'<br>')}</div>
      </div>`;
    document.getElementById('chapterBadge').textContent = `CH.${node.chapter}`;
    // Load next decisions
    if (node.decisions) {
      node.decisions.forEach(d => {
        const dec = STORY[d];
        if (dec) html += renderDecisionNode(dec);
      });
    }
  } else if (node.type === 'decision') {
    html += renderDecisionNode(node);
  } else if (node.type === 'result') {
    html += renderResultNode(node);
    // Auto-load next
    if (node.next) {
      setTimeout(() => {
        const nextNode = STORY[node.next];
        if (nextNode) {
          const existing = document.getElementById('storyContent').innerHTML;
          document.getElementById('storyContent').innerHTML = existing + renderStoryNodeHTML(nextNode);
          attachDecisionHandlers();
        }
      }, 600);
    }
  }

  cont.innerHTML = html;
  attachDecisionHandlers();
}

function renderStoryNodeHTML(node) {
  if (!node) return '';
  if (node.chapter) {
    const ch = CHAPTERS[node.chapter - 1];
    let html = `
      <div class="story-card">
        <div class="story-header">
          <span class="chapter-num">CHAPTER ${node.chapter}</span>
          <span style="font-size:20px">${ch.icon}</span>
          <div class="story-title">${node.title}</div>
        </div>
        <div class="story-body">${node.text.replace(/\n/g,'<br>')}</div>
      </div>`;
    if (node.decisions) {
      node.decisions.forEach(d => { const dec = STORY[d]; if (dec) html += renderDecisionNode(dec); });
    }
    return html;
  }
  if (node.type === 'decision') return renderDecisionNode(node);
  if (node.type === 'result') return renderResultNode(node);
  return '';
}

function renderDecisionNode(node) {
  return `
    <div class="decision-card">
      <div class="dec-header">// DECISION REQUIRED</div>
      <div class="dec-question">${node.question}</div>
      <div class="dec-options">
        ${node.options.map((o,i) => `
          <button class="dec-opt" data-node="${G.storyNode}" data-idx="${i}">
            <span class="dec-opt-text">${o.text}</span>
            <span class="dec-opt-cost ${
              o.cost && o.cost.includes('+') ? 'green' :
              o.cost && (o.cost.includes('-') || o.cost.includes('risk')) ? 'red' : 'gold'
            }">${o.cost || ''}</span>
          </button>`).join('')}
      </div>
    </div>`;
}

function renderResultNode(node) {
  return `
    <div class="result-card result-${node.tone}">
      <div class="result-header">
        <span class="result-icon">${node.icon}</span>
        <span class="result-title" style="color:${node.tone==='good'?'var(--green)':node.tone==='bad'?'var(--red)':'var(--cyan)'}">${node.title}</span>
      </div>
      <div class="result-body">${node.text.replace(/\n/g,'<br>')}</div>
      ${node.effects ? `<div class="result-effects">
        ${node.effects.map(e => `<span class="effect-chip ${e.startsWith('+')?'pos':e.startsWith('-')?'neg':''}">${e}</span>`).join('')}
      </div>` : ''}
    </div>`;
}

function attachDecisionHandlers() {
  document.querySelectorAll('.dec-opt[data-idx]').forEach(btn => {
    btn.onclick = function() {
      const idx = parseInt(this.dataset.idx);
      const nodeId = this.dataset.node;
      const node = STORY[nodeId];
      if (node && node.type === 'decision') {
        makeDecision(idx, node);
      } else {
        // Find current decision node in story chain
        const currentNode = STORY[G.storyNode];
        if (currentNode && currentNode.type === 'decision') {
          makeDecision(idx, currentNode);
        }
      }
    };
  });
}

function drawMiniChart() {
  const canvas = document.getElementById('miniChart');
  if (!canvas) return;
  const ctx2 = canvas.getContext('2d');
  const W2 = canvas.offsetWidth * devicePixelRatio || 400;
  const H2 = 60;
  canvas.width = W2;
  canvas.height = H2;
  ctx2.clearRect(0,0,W2,H2);
  const data = [...G.chartData, G.valuation];
  if (data.length < 2) return;
  const min = Math.min(...data) * 0.9;
  const max = Math.max(...data) * 1.1;
  const range = max - min || 1;
  const pts = data.map((v,i) => ({ x: (i/(data.length-1)) * W2, y: H2 - ((v-min)/range) * H2 * 0.85 - 4 }));
  // Fill
  const grad = ctx2.createLinearGradient(0,0,0,H2);
  grad.addColorStop(0,'rgba(0,255,136,.2)');
  grad.addColorStop(1,'rgba(0,255,136,0)');
  ctx2.fillStyle = grad;
  ctx2.beginPath();
  ctx2.moveTo(pts[0].x, H2);
  pts.forEach(p => ctx2.lineTo(p.x, p.y));
  ctx2.lineTo(pts[pts.length-1].x, H2);
  ctx2.closePath(); ctx2.fill();
  // Line
  ctx2.strokeStyle = '#00ff88'; ctx2.lineWidth = 2;
  ctx2.beginPath();
  pts.forEach((p,i) => i===0 ? ctx2.moveTo(p.x,p.y) : ctx2.lineTo(p.x,p.y));
  ctx2.stroke();
}

function rivalStatBox(label, val) {
  return `<div class="rival-stat"><div class="rival-stat-n">${val}</div><div class="rival-stat-l">${label}</div></div>`;
}

function attackRival(id) {
  const rival = G.rivals.find(r => r.id === id);
  if (!rival) return;
  const cost = Math.floor(G.valuation * 0.005);
  if (G.money < cost) { showToast('Not enough cash to counter!', 'bad'); return; }
  G.money -= cost;
  rival.valuation *= 0.85;
  const msgs = [
    `You launched a counter-campaign against ${rival.name}. Their growth slowed.`,
    `You poached 3 engineers from ${rival.name}. Tech advantage gained.`,
    `You fast-tracked a feature that neutralizes ${rival.name} main differentiator.`,
    `You sealed an exclusive partnership that blocked ${rival.name} from a key market.`,
  ];
  showToast(msgs[Math.floor(Math.random()*msgs.length)], 'good');
  G.reputation += 3;
  updateAllUI();
}

      sc2.fillStyle = sGrad;

// ── UI ACTIONS ──────────────────────────────────────────────
function upgradeOffice() {
  const next = OFFICES[G.officeLevel + 1];
  if (!next) return;
  if (G.money < next.cost) { showToast('Not enough cash!', 'bad'); return; }
  G.money -= next.cost;
  G.officeLevel++;
  if (next.effect) {
    if (next.effect.maxTeam) G.maxTeam = next.effect.maxTeam;
    if (next.effect.rep) G.reputation += next.effect.rep;
  }
  showToast(`🏢 Upgraded to ${next.name}!`, 'good');
  updateAllUI();
}

function hireEngineer(name) {
  const eng = HIRE_POOL.find(h => h.name === name);
  if (!eng) return;
  if (G.team.length >= G.maxTeam) { showToast('Office too small! Upgrade office first.', 'bad'); return; }
  if (G.money < eng.salary * 0.25) { showToast('Not enough cash for first quarter salary!', 'bad'); return; }
  G.team.push({...eng});
  showToast(`✅ ${eng.name} joined as ${eng.role}!`, 'good');
  G.techLevel += 2;
  updateAllUI();
}

function toggleProduct(id) {
  const p = G.products.find(x=>x.id===id);
  if (!p || p.unlockChapter > G.chapter) return;
  p.active = !p.active;
  showToast(`${p.active?'🚀 Launched':'⏸️ Paused'}: ${p.name}`, p.active?'good':'info');
  updateAllUI();
}

function startResearch(id) {
  if (G.researchQueue) { showToast('Already researching something!', 'bad'); return; }
  const item = RESEARCH_ITEMS.find(r=>r.id===id);
  if (!item) return;
  if (G.money < item.cost.money) { showToast('Not enough cash!', 'bad'); return; }
  if (!item.requires.every(r=>G.researched.includes(r))) { showToast('Prerequisites not met!', 'bad'); return; }
  G.money -= item.cost.money;
  G.researchQueue = id;
  G.researchProgress = 0;
  showToast(`🔬 Research started: ${item.name}`, 'info');
  renderResearch();
  updateAllUI();
}

function boostMorale(type) {
  if (type === 'pizza') {
    if (G.money < 2000) { showToast('Not enough cash!','bad'); return; }
    G.money -= 2000;
    updateMorale(5, 'Pizza Friday!');
    updateBoardTrust(1);
  } else if (type === 'raise') {
    if (G.money < 500000) { showToast('Not enough cash for raises!','bad'); return; }
    G.money -= 500000;
    updateMorale(20, 'Across-the-board raise!');
    updateBoardTrust(3);
    showToast('💰 Salaries raised! Team is pumped!', 'good');
  }
  updateAllUI();
}

function openIntlOffice(id) {
  const office = INTL_OFFICES.find(o => o.id === id);
  if (!office) return;
  if (G.money < office.cost) { showToast('Not enough cash!', 'bad'); return; }
  G.money -= office.cost;
  G.intlOffices.push(id);
  G.monthlyRevenue += office.bonus.monthlyRevenue;
  G.reputation += office.bonus.rep;
  updateBoardTrust(5);
  showToast(`🌍 ${office.city} office opened! +${getValDisplay(office.bonus.monthlyRevenue)}/mo`, 'good');
  updateAllUI();
}

function computeSkillEffects() {
  const fx = {};
  G.unlockedSkills.forEach(id => {
    const sk = FOUNDER_SKILLS.find(s => s.id === id);
    if (!sk) return;
    Object.assign(fx, sk.effect);
  });
  G.skillEffects = fx;
  // Apply passive rep
  if (fx.passiveRep && G.week === 1) G.reputation += fx.passiveRep;
  // Enforce min rep
  if (fx.minRep && G.reputation < fx.minRep) G.reputation = fx.minRep;
  // Free counters per month
  if (fx.freeCounters && G.week === 1) G.freeCounters = fx.freeCounters;
}

function unlockSkill(id) {
  const sk = FOUNDER_SKILLS.find(s => s.id === id);
  if (!sk) return;
  if (G.unlockedSkills.includes(id)) { showToast('Already unlocked!', 'info'); return; }
  if (G.skillPoints < sk.cost) { showToast('Not enough skill points!', 'bad'); return; }
  const prereqsMet = sk.requires.every(r => G.unlockedSkills.includes(r));
  if (!prereqsMet) { showToast('Prerequisites not met!', 'bad'); return; }
  G.skillPoints -= sk.cost;
  G.unlockedSkills.push(id);
  computeSkillEffects();
  showToast('🌟 Skill unlocked: ' + sk.name + '!', 'good');
  renderSkillTree();
  updateAllUI();
}

function renderSkillTree() {
  const cont = document.getElementById('skillTreeContent');
  if (!cont) return;
  const tierColors = ['','var(--green)','var(--cyan)','var(--gold)','var(--red)'];
  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<div class="section-title" style="margin:0">⚡ Founder Skills</div>';
  html += '<div style="font-family:var(--font-mono);font-size:12px;color:var(--gold)">SP: ' + G.skillPoints + '</div></div>';
  html += '<div style="font-size:11px;color:var(--dim);margin-bottom:12px">Earn skill points by reaching valuations and completing achievements. Spend them to become a better CEO.</div>';

  [1,2,3,4].forEach(tier => {
    const skills = FOUNDER_SKILLS.filter(s => s.tier === tier);
    html += '<div style="margin-bottom:4px;font-family:var(--font-mono);font-size:9px;color:' + (tierColors[tier]||'var(--dim)') + ';letter-spacing:2px">TIER ' + tier + '</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(' + Math.min(skills.length,3) + ',1fr);gap:6px;margin-bottom:12px">';
    skills.forEach(sk => {
      const unlocked = G.unlockedSkills.includes(sk.id);
      const prereqsMet = sk.requires.every(r => G.unlockedSkills.includes(r));
      const canAfford = G.skillPoints >= sk.cost;
      const available = prereqsMet && !unlocked;
      html += '<div style="background:var(--card);border:1px solid ' +
        (unlocked ? 'rgba(0,255,136,.4)' : available ? 'rgba(0,148,255,.3)' : 'var(--border)') +
        ';border-radius:4px;padding:10px;opacity:' + (prereqsMet||unlocked ? '1' : '.4') + ';cursor:' + (available?'pointer':'default') + '"' +
        (available ? ' onclick="unlockSkill(\''+sk.id+'\')"' : '') + '>';
      html += '<div style="font-size:20px;margin-bottom:4px">' + sk.emoji + '</div>';
      html += '<div style="font-size:11px;font-weight:600;color:' + (unlocked?'var(--green)':'var(--bright)') + '">' + sk.name + '</div>';
      html += '<div style="font-size:9px;color:var(--dim);margin-top:3px;line-height:1.4">' + sk.desc + '</div>';
      html += '<div style="margin-top:6px;font-family:var(--font-mono);font-size:10px;color:' + (unlocked?'var(--green)':canAfford&&available?'var(--gold)':'var(--dim)') + '">';
      html += unlocked ? '✅ UNLOCKED' : (available ? 'Cost: ' + sk.cost + ' SP' : (prereqsMet?'Cost: '+sk.cost+' SP':'🔒 LOCKED'));
      html += '</div></div>';
    });
    html += '</div>';
  });
  cont.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// EMAIL INBOX SYSTEM
// ═══════════════════════════════════════════════════════════
function checkEmailQueue() {
  EMAIL_TEMPLATES.forEach(em => {
    if (!G.inbox.find(i => i.id === em.id) && em.chapter <= G.chapter) {
      // Add with slight delay per email
      G.inbox.unshift({ ...em, read: false, timestamp: G.year + '-' + String(G.month).padStart(2,'0') });
      G.unreadEmails++;
      // Update tab badge
      updateEmailBadge();
    }
  });
}

function updateEmailBadge() {
  const badge = document.getElementById('emailBadge');
  if (badge) {
    badge.textContent = G.unreadEmails > 0 ? G.unreadEmails : '';
    badge.style.display = G.unreadEmails > 0 ? 'inline' : 'none';
  }
}

function renderInbox() {
  const cont = document.getElementById('inboxContent');
  if (!cont) return;
  const unread = G.inbox.filter(e => !e.read).length;
  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<div class="section-title" style="margin:0">📧 Inbox</div>';
  if (unread > 0) html += '<div style="font-family:var(--font-mono);font-size:11px;color:var(--red)">' + unread + ' unread</div>';
  html += '</div>';

  if (!G.inbox.length) {
    html += '<div class="empty-state">No emails yet. Check back as you grow.</div>';
  } else {
    G.inbox.forEach((em, idx) => {
      html += '<div style="background:var(--card);border:1px solid ' + (em.read?'var(--border)':'rgba(0,148,255,.3)') + ';border-radius:4px;margin-bottom:8px;overflow:hidden;cursor:pointer" onclick="openEmail(' + idx + ')">';
      html += '<div style="padding:10px 12px;display:flex;gap:10px;align-items:flex-start">';
      html += '<div style="width:8px;height:8px;border-radius:50%;background:' + (em.read?'transparent':'var(--blue)') + ';flex-shrink:0;margin-top:4px"></div>';
      html += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:' + (em.read?'var(--text)':'var(--bright)') + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + em.subject + '</div>';
      html += '<div style="font-size:10px;color:var(--dim);margin-top:2px">' + em.fromName + ' · ' + em.timestamp + '</div></div>';
      html += '<div style="font-size:16px">' + (em.read ? '' : '●') + '</div>';
      html += '</div></div>';
    });
  }
  cont.innerHTML = html;
}

function closeEventOverlay() {
  document.getElementById('eventOverlay').classList.remove('show');
}

function openEmail(idx) {
  const em = G.inbox[idx];
  if (!em) return;
  em.read = true;
  G.unreadEmails = Math.max(0, G.unreadEmails - 1);
  updateEmailBadge();

  // Show in event overlay style
  const box = document.getElementById('eventBox');
  box.className = 'event-box opportunity';
  document.getElementById('evEmoji').textContent = '📧';
  document.getElementById('evTitle').textContent = em.subject;
  const tag = document.getElementById('evTag');
  tag.textContent = 'FROM: ' + em.fromName;
  tag.className = 'event-type-tag tag-neutral';
  document.getElementById('evDesc').innerHTML = '<div style="font-size:11px;color:var(--dim);margin-bottom:8px">From: ' + em.from + ' · ' + em.timestamp + '</div>' + em.body;

  const choices = document.getElementById('evChoices');
  if (em.choices && !em.replied) {
    choices.innerHTML = em.choices.map((c,i) =>
      '<button class="event-choice" onclick="replyEmail(' + idx + ',' + i + ')">' +
      '<span class="choice-text">' + c.label + '</span>' +
      '</button>'
    ).join('');
  } else {
    choices.innerHTML = '<button class="event-choice" onclick="closeEventOverlay()"><span class="choice-text">✓ Close</span></button>';
  }
  document.getElementById('eventOverlay').classList.add('show');
  renderInbox();
}

function replyEmail(emailIdx, choiceIdx) {
  const em = G.inbox[emailIdx];
  if (!em || em.replied) return;
  em.replied = true;
  const choice = em.choices[choiceIdx];
  applyEffects(choice.effect || {});
  checkAchievements();
  document.getElementById('eventOverlay').classList.remove('show');
  showToast('📧 Reply sent: "' + choice.reply + '"', 'good');
  updateAllUI();
}

// ═══════════════════════════════════════════════════════════
// TWITTER FEED SYSTEM
// ═══════════════════════════════════════════════════════════
function updateTwitterFeed() {
  // Add unseen tweets based on chapter / rep
  const available = TWITTER_EVENTS.filter(t => !G.seenTweets.includes(t.id));
  if (available.length > 0 && Math.random() < 0.5) {
    const tweet = available[Math.floor(Math.random() * available.length)];
    G.seenTweets.push(tweet.id);
    G.twitterFeed.unshift({ ...tweet, time: G.year + '-' + String(G.month).padStart(2,'0') });
    if (G.twitterFeed.length > 20) G.twitterFeed.pop();
    if (tweet.repBonus) {
      G.reputation = Math.max(0, G.reputation + tweet.repBonus);
      if (Math.abs(tweet.repBonus) >= 10) {
        showToast((tweet.repBonus > 0 ? '🐦 +' : '🐦 ') + tweet.repBonus + ' rep from Twitter', tweet.repBonus > 0 ? 'good' : 'bad');
      }
    }
  }
}

function renderTwitterFeed() {
  const cont = document.getElementById('twitterContent');
  if (!cont) return;
  let html = '<div class="section-title">🐦 Tech Twitter</div>';
  if (!G.twitterFeed.length) {
    html += '<div class="empty-state">No tweets yet. Make some noise.</div>';
  } else {
    G.twitterFeed.forEach(tw => {
      const col = tw.type === 'positive' ? 'var(--green)' : tw.type === 'negative' ? 'var(--red)' : 'var(--cyan)';
      html += '<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid ' + col + ';border-radius:4px;padding:10px 12px;margin-bottom:8px">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px">';
      html += '<span style="font-family:var(--font-mono);font-size:11px;color:' + col + '">' + tw.author + '</span>';
      if (tw.followers) html += '<span style="font-size:9px;color:var(--dim)">' + tw.followers + ' followers</span>';
      html += '</div>';
      html += '<div style="font-size:12px;color:var(--text);line-height:1.5">' + tw.text + '</div>';
      html += '<div style="font-size:9px;color:var(--dim);margin-top:6px">' + tw.time + ' · ' + (tw.repBonus > 0 ? '+' : '') + tw.repBonus + ' rep</div>';
      html += '</div>';
    });
  }
  cont.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// TECH DEBT SYSTEM
// ═══════════════════════════════════════════════════════════
function tickTechDebt() {
  // Debt builds when shipping fast (high decision velocity) or many active products
  const activeProds = G.products.filter(p => p.active).length;
  const debtGrowth = activeProds * 0.5 + (G.totalDecisions > 20 ? 1 : 0);
  const debtDecay = G.researched.length * 0.3; // Good engineering slows debt
  G.techDebt = Math.min(100, Math.max(0, G.techDebt + debtGrowth - debtDecay));

  // Trigger debt events
  const triggered = TECH_DEBT_EVENTS.find(e => G.techDebt >= e.threshold && !G.events.includes('debt_' + e.threshold));
  if (triggered) {
    G.events.push('debt_' + triggered.threshold);
    applyEffects(triggered.damage);
    showToast('⚠️ Tech Debt: ' + triggered.msg, 'bad');
    // Auto show event overlay for serious ones
    if (triggered.threshold >= 70) {
      showEvent({
        id: 'debt_crisis_' + triggered.threshold,
        type: 'crisis', emoji: '🔧',
        title: 'Tech Debt Crisis',
        tag: 'ENGINEERING', tagClass: 'tag-crisis',
        desc: triggered.msg + ' Your engineering team is overwhelmed.',
        choices: [
          { text: '🔧 Dedicate full sprint to debt reduction', hint: '-2 weeks features, -$50K', effect: { money: -50000, techDebt_reduce: 30 } },
          { text: '💰 Hire 3 more engineers to handle it', hint: '-$300K/yr', effect: { money: -300000, techDebt_reduce: 20 } },
          { text: '🚀 Ship through it, deal with consequences later', hint: '+velocity, more debt', effect: { techDebt_add: 15 } },
        ]
      });
    }
  }
}

function updateTicker() {
  const items = [...G.tickerItems, ...TICKER_BASE];
  const unique = [...new Set(items)];
  document.getElementById('ticker').textContent = unique.join('  ·  ');
}

function updateAllUI() {
  // Stats bar
  document.getElementById('statMoney').textContent = getMoneyDisplay(G.money);
  document.getElementById('statTeam').textContent = G.team.length;
  document.getElementById('statRep').textContent = G.reputation;
  document.getElementById('statTech').textContent = G.techLevel;
  document.getElementById('statVal').textContent = getValDisplay(Math.floor(G.valuation));
  document.getElementById('topCompanyName').textContent = G.companyName;

  // Refresh active panel
  const active = document.querySelector('.panel.active');
  if (!active) return;
  if (active.id === 'panelCompany') renderCompany();
  if (active.id === 'panelRivals') renderRivals();
  if (active.id === 'panelResearch') renderResearch();
  if (active.id === 'panelMarket') renderMarket();
  if (active.id === 'panelHub') { renderSkillTree(); renderTwitterFeed(); renderInbox(); }
}

function switchTab(name, panelId, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
  btn.classList.add('active');
  document.getElementById('gameBody').scrollTop = 0;
  // Render panel
  if (panelId==='panelCompany') renderCompany();
  if (panelId==='panelRivals') renderRivals();
  if (panelId==='panelResearch') renderResearch();
  if (panelId==='panelMarket') renderMarket();
  if (panelId==='panelHub') { renderSkillTree(); renderTwitterFeed(); renderInbox(); }
}

function toggleMenu() {
  showToast('Game menu: ESC or refresh to restart', 'info');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('off'));
  document.getElementById(id).classList.remove('off');
}

function showWin() {
  clearInterval(gameTimerInterval);
  const finalRank = getRankString();
  document.getElementById('winSub').innerHTML = `You started in a bedroom with $800 and built the most valuable AI company on Earth. The world will never be the same.<br><br><span style="color:var(--gold)">${finalRank}</span>`;
  document.getElementById('winStats').innerHTML = `
    <div class="win-stat"><div class="win-stat-n">${getValDisplay(G.valuation)}</div><div class="win-stat-l">Final Valuation</div></div>
    <div class="win-stat"><div class="win-stat-n">${G.team.length}</div><div class="win-stat-l">Team Size</div></div>
    <div class="win-stat"><div class="win-stat-n">${G.totalDecisions}</div><div class="win-stat-l">Decisions Made</div></div>
    <div class="win-stat"><div class="win-stat-n">${G.crisisWeathered}</div><div class="win-stat-l">Crises Survived</div></div>
  `;
  showScreen('win');
}

function restartGame() {
  clearInterval(gameTimerInterval);
  location.reload();
}

// Show toast
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Save/Load
function saveGame() {
  try { localStorage.setItem('se_save', JSON.stringify(G)); showToast('💾 Game saved!', 'good'); } catch(e) {}
}
function loadGame() {
  try {
    const s = localStorage.getItem('se_save');
    if (s) { Object.assign(G, JSON.parse(s)); return true; }
  } catch(e) {}
  return false;
}

// Auto-save every 30s
setInterval(saveGame, 30000);
</script>
